<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <script src="js/script.js"></script>
    <script src="js/game.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="title-container">
        <h1 id="title">TETRIS</h1>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <div id="controls-container-container">
        <div id="controls-container">
            <img id="arrow-left" src="images/arrow-left.svg">
            <img id="rotate-left" src="images/rotate-left.svg">
            <img id="rotate-right" src="images/rotate-right.svg">
            <img id="arrow-right" src="images/arrow-right.svg">
            <button class="hidden" id="replay-button">Play Again</button>
        </div>
    </div>
</body>
</html>
